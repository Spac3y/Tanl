<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>500 - Server Error</title>
	<style>
		body {
			background-color: #f8f9fa;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}

		.container {
			text-align: center;
			max-width: 700px;
			padding: 30px;
			background-color: #ffffff;
			border-radius: 10px;
			box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
		}

		h1 {
			font-size: 4rem;
			color: #dc3545;
			margin-bottom: 10px;
		}

		p {
			font-size: 1rem;
			color: #666;
		}

		pre {
			text-align: left;
			background: #f1f1f1;
			color: #c7254e;
			padding: 15px;
			overflow-x: auto;
			border-left: 5px solid #dc3545;
			font-size: 0.9rem;
			margin-top: 20px;
			border-radius: 5px;
			max-height: 300px;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>500</h1>
		<p>Internal Server Error</p>
		<p>Something went wrong. The developer has been notified.</p>
		{% if error_message %}
		<pre>{{ error_message }}</pre>
		{% endif %}
	</div>
</body>

</html>
