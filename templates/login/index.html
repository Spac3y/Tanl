<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tanl - Login</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='login/style.css') }}">
	<script src="{{ url_for('static', filename='login/javascript.js') }}"></script>
	<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.png')}}">
</head>
<body>
	<div class="main-wrapper">
		<image id="logo" src="static/favicon.png" alt="Tanl-Icon"></image>
		<h2>Crează un cont</h2>
		<div id="emailLogin">
			<input type="email">
			<button id="emailLoginButton">Sign in with email</button>
		</div>
		<hr>
		<p>or continue with</p>
		<div id="googleLogin">
			<a href="/login">
				<!-- <image src="images/" alt="Google Icon"></image>
				<button id="googleLoginButton" >Google</button> -->
				<image id="googleLoginButton" src="/static/login/images/google-signin-assets/Web/png@1x/light/web_light_rd_SI@1x.png" alt="Google login"></image>
			</a>
		</div>
		<hr>
		<div>
			<p>
				By clicking continue, you agree to our 
				<a href="/">Terms of Service</a> and 
				<a href="/">Privacy Policy</a>
			</p>
		</div>
		<hr>
		<div class="">
			<a href="/logout">
				<button> Log out</button>
			</a>
		</div>
	</div>
</body>
</html>
